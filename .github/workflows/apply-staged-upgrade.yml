name: Apply curriculum interface upgrade

on:
  push:
    branches: [main]
    paths:
      - tools/apply_staged_upgrade.py
      - tools/upgrade_payload/**
      - .github/workflows/apply-staged-upgrade.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Apply staged files
        run: python tools/apply_staged_upgrade.py
      - name: Validate app
        run: |
          node --check app.js
          node --check verbs.js
          node --check speech-fix.js
          node --check sw.js
          python -m py_compile tools/generate_audio.py
      - name: Commit upgraded app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf tools/upgrade_payload tools/apply_staged_upgrade.py .github/workflows/apply-staged-upgrade.yml
          git add -A
          git commit -m "Add 1000-word daily curriculum and verb conjugations"
          git push

# Updated through a normal merge so the push workflow runs.
