name: Build 1000-word Persian curriculum

on:
  push:
    branches: [main]
    paths:
      - scripts/generate_curriculum.mjs
      - verbs.js
      - .github/workflows/generate-curriculum.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-curriculum:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate frequency-informed curriculum
        run: node scripts/generate_curriculum.mjs

      - name: Validate generated JavaScript
        run: |
          node --check words.js
          node --check verbs.js

      - name: Commit generated curriculum
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add words.js
          if git diff --cached --quiet; then
            echo "Curriculum is already current."
            exit 0
          fi
          git commit -m "Build 1000-word Persian frequency curriculum"
          git push
