name: Generate bundled Persian audio

on:
  push:
    branches: [main]
    paths:
      - words.js
      - tools/generate_audio.py
      - .github/workflows/generate-audio.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak ffmpeg
          python -m pip install --upgrade edge-tts

      - name: Generate all pronunciations
        run: python tools/generate_audio.py

      - name: Commit generated audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio
          if git diff --cached --quiet; then
            echo "Audio files are already current."
            exit 0
          fi
          git commit -m "Add bundled Persian pronunciation audio"
          git push
